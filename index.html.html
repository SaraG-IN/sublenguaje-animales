<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hydra Sublenguaje</title>
  <script src="https://unpkg.com/hydra-synth"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #input {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 600px;
      height: 80px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 18px;
      border: 2px solid white;
      border-radius: 10px;
      padding: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
      resize: none;
    }
  </style>
</head>
<body>
  <textarea id="input" placeholder="¿Qué animal te gusta más?
perro, gato, conejo, leon, chinchilla, nutria, pato, zariguella, serpiente, iguana"></textarea>

  <script>
    const hydra = new Hydra({ detectAudio: false });

    const palabras = {

  perro: () =>
    osc(8,0.08,1).modulate(noise(4,0.2),0.35).color(0.72,0.55,0.35).kaleid(6).rotate(()=>time*0.08).contrast(1.3),

  gato: () =>
    shape(2,0.3).repeat(8,3).rotate(()=>time*0.05).modulateRotate(osc(20,0.1),0.4).color(0.2,1,0.3).kaleid(2),

  conejo: () =>
    shape(99,0.25).repeat(6,6).modulateScale(noise(3),0.3).color(1,0.85,0.9).rotate(()=>time*0.03).scale(1.1),

  leon: () =>
    osc(30,0.05,2).kaleid(20).color(1,0.7,0.1).modulate(noise(8),0.25).rotate(()=>time*0.12).contrast(1.5),

  chinchilla: () =>
    noise(15,0.05).color(0.8,0.8,0.85).posterize(12).modulate(noise(30),0.15),

  nutria: () =>
    voronoi(8,0.4).modulate(osc(6,0.08,1.5).rotate(()=>time*0.1),0.3).color(0.3,0.6,1),

  pato: () =>
    osc(12,0.04,1).modulate(noise(4,0.2),0.25).color(0.2,0.8,0.4).repeat(4,4).rotate(()=>time*0.05),

  zariguella: () =>
    noise(5,0.3).modulate(voronoi(12),0.45).color(0.6,0.6,0.8).rotate(()=>time*0.15).posterize(7),

  serpiente: () =>
    voronoi(20,0.15).kaleid(8).color(0.1,0.8,0.2).modulateRotate(osc(40,0.05),0.4).rotate(()=>time*0.1),

  iguana: () =>
    voronoi(18,0.3).color(0.1,1,0.4).modulate(noise(8,0.2),0.3).kaleid(5).rotate(()=>time*0.08).saturate(2)

};

    const input = document.getElementById("input");

    input.addEventListener("input", () => {
      const texto = input.value.toLowerCase().trim();

      // Si contiene comas: modulación encadenada
      if (texto.includes(",")) {
        const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulate(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si contiene comas: modulación encadenada
      if (texto.includes("x")) {
        const modWords = texto.split("x").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulateScale(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si no hay coma, renderiza todo en capas independientes
      const entradas = texto.split(/\s+/).map(w => w.trim()).filter(w => palabras[w]);
      if (entradas.length > 0) {
        // Componer blend entre todas
        let comp = palabras[entradas[0]]();
        for (let i = 1; i < entradas.length; i++) {
          comp = comp.diff(palabras[entradas[i]](), 0.5);
        }
        comp.out();
      }
    });
  </script>
</body>
</html>
